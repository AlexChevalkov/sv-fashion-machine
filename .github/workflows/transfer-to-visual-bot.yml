name: Transfer To Visual Bot

on:
  workflow_dispatch:
  # Запуск по расписанию перенесён во внешний сервис cron-job.org (надёжный триггер).
  # Историческая логика: schedule "*/30 * * * *" — каждые 30 минут (в :00 и :30).
  # Новое расписание задаётся в cron-job.org (Europe/Moscow), тот же интервал.

jobs:
  transfer-to-visual:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run transfer to visual bot
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: Content Inbox
          AIRTABLE_VISUAL_TABLE_NAME: Visual Jobs
        run: |
          python transfer_to_visual_bot.py

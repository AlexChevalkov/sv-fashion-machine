name: Carousel Assembly Bot

on:
  workflow_dispatch:

jobs:
  carousel-assembly-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pillow

      - name: Assemble Carousel Slides
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python carousel_assembly_bot.py

      - name: Upload assembled carousel
        uses: actions/upload-artifact@v4
        with:
          name: krea-carousel-assembled
          path: outputs/assembled_carousel_slide_*.png

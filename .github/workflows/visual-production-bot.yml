name: Visual Production Bot

on:
  workflow_dispatch:

jobs:
  visual-production-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install anthropic requests pillow

      - name: Run Visual Production Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KREA_API_KEY: ${{ secrets.KREA_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: Visual Jobs
          AIRTABLE_VIEW_NAME: Queued Visual Jobs
          BRAND_NAME: SV FASHION MEDIA
          INSTAGRAM_HANDLE: "@sv_fashionacademy"
        run: |
          python visual_production_bot.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: visual-production-outputs
          path: outputs/

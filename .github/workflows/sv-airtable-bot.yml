name: SV Airtable Bot

on:
  workflow_dispatch:
  # Запуск по расписанию перенесён во внешний сервис cron-job.org (надёжный триггер).
  # Историческая логика (была ненадёжна на GitHub; GitHub cron игнорирует timezone и шёл по UTC):
  #   schedule: "17 8,16,20 * * *"  — 3 раза в сутки (задумано Asia/Jerusalem).
  # Новое расписание: 3×/сутки по Europe/Moscow, задаётся в cron-job.org.

jobs:
  sv-airtable-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install anthropic feedparser requests beautifulsoup4

      - name: Run SV Airtable Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_WEBHOOK_URL: ${{ secrets.AIRTABLE_WEBHOOK_URL }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: Content Inbox
        run: python sv_airtable_bot.py

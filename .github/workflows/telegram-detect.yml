name: Telegram Detect

# Temporary: read getUpdates to find the owner's chat id. Delete after setup.
on:
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install requests
      - name: Detect chat id
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          python - <<'PY'
          import os, json, requests
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          print("token present:", bool(token))
          me = requests.get(f"https://api.telegram.org/bot{token}/getMe", timeout=30).json()
          print("BOT username:", (me.get("result") or {}).get("username"))
          r = requests.get(f"https://api.telegram.org/bot{token}/getUpdates", timeout=30)
          print("getUpdates HTTP:", r.status_code)
          data = r.json()
          print("ok:", data.get("ok"))
          chats = {}
          for u in data.get("result", []):
              msg = u.get("message") or u.get("edited_message") or u.get("channel_post") or {}
              chat = msg.get("chat") or {}
              if chat.get("id") is not None:
                  chats[str(chat["id"])] = f"{chat.get('type')} / {chat.get('username') or chat.get('first_name') or ''}"
          print("CHATS_FOUND:", json.dumps(chats, ensure_ascii=False))
          PY

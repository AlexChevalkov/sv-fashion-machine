name: Krea Reel Test Bot

on:
  workflow_dispatch:

jobs:
  krea-reel-test-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Render Krea Reel Clip
        env:
          KREA_API_KEY: ${{ secrets.KREA_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python krea_reel_test_bot.py

      - name: Upload generated reel clip
        uses: actions/upload-artifact@v4
        with:
          name: krea-reel-clip-test
          path: outputs/krea_reel_clip_test.mp4

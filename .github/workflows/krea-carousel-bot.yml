name: Krea Carousel Bot

on:
  workflow_dispatch:

jobs:
  krea-carousel-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests

      - name: Render Krea Carousel Images
        env:
          KREA_API_KEY: ${{ secrets.KREA_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python krea_carousel_bot.py

      - name: Upload generated carousel images
        uses: actions/upload-artifact@v4
        with:
          name: krea-carousel-slides
          path: outputs/krea_carousel_slide_*.png

name: Visual Production Bot

on:
  workflow_dispatch:
  # Запуск по расписанию перенесён во внешний сервис cron-job.org (надёжный триггер).
  # Историческая логика: schedule "22,52 * * * *" — каждые 30 минут (в :22 и :52),
  # со сдвигом относительно других ботов, чтобы держать порядок конвейера в течение часа.
  # Новое расписание задаётся в cron-job.org (Europe/Moscow), тот же интервал и сдвиг.

# Защита от наложения запусков: у Krea лимит = 1 одновременная задача.
# Один запуск Visual Production за раз; новый ждёт завершения предыдущего.
concurrency:
  group: visual-production
  cancel-in-progress: false

jobs:
  visual-production-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install Python dependencies
        run: |
          pip install anthropic requests pillow boto3

      - name: Run Visual Production Bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KREA_API_KEY: ${{ secrets.KREA_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: Visual Jobs
          AIRTABLE_VIEW_NAME: Queue
          BRAND_NAME: SV FASHION MEDIA
          INSTAGRAM_HANDLE: "@sv_fashionacademy"
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python visual_production_bot.py

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: visual-production-outputs
          path: outputs/*

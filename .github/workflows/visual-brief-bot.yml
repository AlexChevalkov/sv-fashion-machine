name: Visual Brief Bot

on:
  workflow_dispatch:
  # Запуск по расписанию перенесён во внешний сервис cron-job.org (надёжный триггер).
  # Историческая логика: schedule "13,43 * * * *" — каждые 30 минут (в :13 и :43),
  # со сдвигом относительно других ботов, чтобы держать порядок конвейера в течение часа.
  # Новое расписание задаётся в cron-job.org (Europe/Moscow), тот же интервал и сдвиг.

jobs:
  visual-brief-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install anthropic requests pillow

      - name: Generate Visual Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_NAME: Content Inbox
        run: python visual_brief_bot.py

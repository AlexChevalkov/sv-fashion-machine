name: Buffer Smoke Test

# Temporary workflow to validate that BUFFER_ACCESS_TOKEN can create an
# Instagram draft via Buffer's GraphQL API. Delete after validation.
on:
  workflow_dispatch:

jobs:
  buffer-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Probe Buffer API endpoints
        env:
          BUFFER_ACCESS_TOKEN: ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_CHANNEL_ID: "6a2481eac687a22dd46ad06c"
        run: |
          python - <<'PY'
          import os, json, requests

          token = os.environ["BUFFER_ACCESS_TOKEN"]
          channel = os.environ["BUFFER_CHANNEL_ID"]
          print("TOKEN length:", len(token), "prefix:", token[:6])

          def show(label, fn):
              print("=" * 60)
              print("PROBE:", label)
              try:
                  r = fn()
                  print("HTTP", r.status_code)
                  print(r.text[:1200])
              except Exception as e:
                  print("EXC", repr(e))

          # 1) Classic API v1 — is this a classic access token?
          show("classic GET /1/user.json", lambda: requests.get(
              "https://api.bufferapp.com/1/user.json",
              params={"access_token": token}, timeout=30))

          # 2) GraphQL endpoint candidates
          mutation = "query { account { id email } }"
          for host in ["https://graph.buffer.com", "https://api.buffer.com/graphql",
                       "https://publish.buffer.com/graphql", "https://api.bufferapp.com/graphql"]:
              show("GraphQL account @ " + host, lambda h=host: requests.post(
                  h, json={"query": mutation},
                  headers={"Authorization": "Bearer " + token, "Content-Type": "application/json"},
                  timeout=30))
          PY
